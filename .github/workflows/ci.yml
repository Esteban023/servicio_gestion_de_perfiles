name: Run Tests

on:
  push:
    branches: [ "rama-respaldo" ]
  pull_request:
    branches: [ "rama-respaldo" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn -B -Dspring.profiles.active=test clean test